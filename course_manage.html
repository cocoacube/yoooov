<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课程管理 · Yoooov School</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap');
:root{--bg:#0d0e14;--panel:#171920;--panel2:#20232c;--line:rgba(255,255,255,.09);--line2:rgba(255,255,255,.16);--text:#f4f6fb;--muted:#8c93a3;--green:#05c77e;--red:#ff6676;--yellow:#ffc94d}
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Space Grotesk','Noto Sans SC',sans-serif}button,input,textarea,select{font:inherit}button{cursor:pointer}
nav{height:76px;display:flex;align-items:center;justify-content:space-between;padding:0 38px;border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:11px;color:#fff;text-decoration:none;font-size:20px;font-weight:800}.logo{width:36px;height:36px;background:url('assets/yoooov-logo-v1-compact.svg') center/contain no-repeat}.nav-actions{display:flex;gap:10px}
.btn{height:38px;padding:0 15px;border:1px solid var(--line2);border-radius:11px;background:var(--panel);color:#fff;font-size:12px;font-weight:800;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.btn.primary{border:0;background:var(--green);color:#06140e}.btn.danger{color:#ff8b96}.btn:disabled{opacity:.55;cursor:not-allowed}
main{width:min(1280px,calc(100vw - 64px));margin:0 auto;padding:34px 0 70px}.hero{display:flex;align-items:flex-end;justify-content:space-between;gap:22px;margin-bottom:22px}.eyebrow{color:var(--green);font-size:11px;font-weight:900;text-transform:uppercase;margin-bottom:8px}h1{font-size:32px;margin-bottom:8px}.subtitle{color:var(--muted);font-size:13px}.auth{display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center;margin-bottom:22px;padding:18px 20px;border:1px solid var(--line2);border-left:3px solid var(--yellow);background:var(--panel)}.auth.verified{border-left-color:var(--green)}.auth strong{display:block;margin-bottom:5px}.auth span,.status{color:var(--muted);font-size:12px}.auth-controls{display:flex;gap:8px}.auth input,.toolbar input,.modal input,.modal textarea,.modal select{border:1px solid var(--line);border-radius:10px;background:var(--panel2);color:#fff;outline:none}.auth input{height:40px;width:240px;padding:0 12px}.toolbar{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:15px}.toolbar input{height:40px;width:min(360px,100%);padding:0 13px}
.manage-area[hidden]{display:none}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}.stat{padding:16px;border:1px solid var(--line);border-radius:14px;background:var(--panel)}.stat span{display:block;color:var(--muted);font-size:11px;font-weight:800}.stat strong{display:block;margin-top:5px;font-size:24px}
.list{display:grid;gap:12px}.course-row{display:grid;grid-template-columns:82px minmax(220px,1fr) 210px auto;gap:16px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:15px;background:var(--panel)}.cover{width:82px;height:58px;border-radius:10px;object-fit:cover;background:var(--panel2)}.name{font-size:16px;margin-bottom:5px}.meta,.summary{color:var(--muted);font-size:12px}.summary{max-width:560px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.badge{display:inline-flex;align-items:center;height:24px;padding:0 9px;border-radius:999px;background:rgba(255,255,255,.06);color:#dce2ee;font-size:11px;font-weight:800}.badge.published{background:rgba(5,199,126,.13);color:#71f0bb}.badge.draft{background:rgba(255,201,77,.12);color:#ffd977}.badge.scheduled{background:rgba(140,89,255,.16);color:#c8afff}.row-actions{display:flex;gap:7px}.empty{padding:56px 20px;border:1px dashed var(--line);border-radius:16px;color:var(--muted);text-align:center}
.modal[hidden]{display:none}.modal{position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:20px;background:rgba(3,4,8,.78);backdrop-filter:blur(8px)}.modal-card{width:min(720px,100%);max-height:calc(100vh - 40px);overflow:auto;padding:24px;border:1px solid var(--line);border-radius:18px;background:var(--panel)}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.close{border:0;background:transparent;color:var(--muted);font-size:25px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}label{display:block;color:#ccd3df;font-size:12px;font-weight:800}.modal input,.modal textarea,.modal select{width:100%;margin-top:7px;padding:10px 12px}.modal textarea{min-height:100px;resize:vertical}.modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:16px}.edit-status{min-height:18px;margin-top:10px;color:var(--red);font-size:12px;text-align:center}
@media(max-width:860px){nav{padding:0 18px}main{width:calc(100vw - 28px)}.hero,.auth{grid-template-columns:1fr;display:grid;align-items:start}.stats{grid-template-columns:repeat(2,1fr)}.course-row{grid-template-columns:72px 1fr}.row-actions,.course-state{grid-column:2}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav><a class="brand" href="index.html"><span class="logo"></span>Yoooov.</a><div class="nav-actions"><a class="btn" href="course_upload.html">上传课程</a><a class="btn" href="yoooov_school.html">课程中心</a></div></nav>
<main>
  <section class="hero"><div><div class="eyebrow">Course Admin</div><h1>课程管理</h1><p class="subtitle">验证后可查看、编辑、发布、下架和删除课程；需要新增内容时使用顶部“上传课程”。</p></div></section>
  <section class="auth" id="authBox"><div><strong id="authTitle">访问验证</strong><span id="authText">验证通过后显示课程管理列表。</span></div><div class="auth-controls"><input id="passcode" type="password" placeholder="Access key" aria-label="访问密钥"><button class="btn" id="togglePass" type="button">显示</button><button class="btn primary" id="verify" type="button">验证</button><button class="btn" id="clear" type="button" hidden>清除</button></div></section>
  <section class="manage-area" id="manageArea" hidden>
    <section class="stats"><div class="stat"><span>全部课程</span><strong id="total">—</strong></div><div class="stat"><span>已发布</span><strong id="published">—</strong></div><div class="stat"><span>草稿</span><strong id="draft">—</strong></div><div class="stat"><span>课节数</span><strong id="lessons">—</strong></div></section>
    <div class="toolbar"><input id="search" type="search" placeholder="搜索课程名称、讲师或工具"><span class="status" id="status"></span></div>
    <section class="list" id="list"></section>
  </section>
</main>
<div class="modal" id="editModal" hidden>
  <form class="modal-card" id="editForm">
    <div class="modal-head"><h2>编辑课程</h2><button class="close" id="closeEdit" type="button">×</button></div>
    <div class="grid">
      <label>课程名称<input id="editTitle" maxlength="120" required></label>
      <label>讲师<input id="editTeacher" maxlength="80" required></label>
      <label>工具 / 方向<input id="editTool" maxlength="80" required></label>
      <label>难度<input id="editDifficulty" maxlength="40" required></label>
      <label>年龄段<input id="editAge" maxlength="40"></label>
      <label>分类<input id="editCategory" maxlength="40"></label>
      <label>访问权限<select id="editAccess"><option value="free">Free</option><option value="member">Member</option><option value="paid">Paid</option></select></label>
      <label>状态<select id="editStatusField"><option value="draft">Draft</option><option value="published">Published</option><option value="scheduled">Scheduled</option></select></label>
      <label class="full">发布时间<input id="editPublishAt" placeholder="YYYY-MM-DD HH:MM，可留空"></label>
      <label class="full">封面 URL<input id="editCover" maxlength="2000"></label>
      <label class="full">标签<input id="editTags" placeholder="使用逗号分隔"></label>
      <label class="full">课程简介<textarea id="editSummary" maxlength="300" required></textarea></label>
      <label class="full">详细介绍<textarea id="editDescription" maxlength="5000"></textarea></label>
    </div>
    <div class="modal-actions"><button class="btn" id="cancelEdit" type="button">取消</button><button class="btn primary" id="saveEdit" type="submit">保存</button></div>
    <div class="edit-status" id="editMsg"></div>
  </form>
</div>
<script>
const list=document.getElementById('list'),search=document.getElementById('search'),statusEl=document.getElementById('status'),passcodeEl=document.getElementById('passcode');
let passcode='',courses=[],editing=null;
const esc=v=>{const el=document.createElement('span');el.textContent=String(v??'');return el.innerHTML};
const compact=v=>Number(v||0).toLocaleString();
function cover(value){const c=String(value||'').trim();if(!c)return 'assets/yoooov-logo-v2-soft.svg';if(/^(https?:)?\/\//i.test(c)||c.startsWith('/')||/^(data|blob):/i.test(c))return c;if(/^yoooov\//i.test(c))return `/${c}`;return c}
function setVerified(ok){document.getElementById('authBox').classList.toggle('verified',ok);document.getElementById('manageArea').hidden=!ok;passcodeEl.hidden=ok;document.getElementById('togglePass').hidden=ok;document.getElementById('verify').hidden=ok;document.getElementById('clear').hidden=!ok;document.getElementById('authTitle').textContent=ok?'访问已验证':'访问验证';document.getElementById('authText').textContent=ok?'现在可以管理所有课程。':'验证通过后显示课程管理列表。';if(!ok)passcode=''}
async function loadCourses(){statusEl.textContent='正在加载课程…';const res=await fetch('/api/courses/admin-list',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({passcode})});const data=await res.json().catch(()=>({}));if(!res.ok||!data.ok)throw new Error(data.errorMsg||data.error||'加载失败');courses=Array.isArray(data.courses)?data.courses:[];render();statusEl.textContent=`已加载 ${courses.length} 门课程。`}
async function verify(){const value=passcodeEl.value.trim();if(!value){statusEl.textContent='请输入访问密钥。';return}passcode=value;try{await loadCourses();passcodeEl.value='';setVerified(true)}catch(e){passcode='';setVerified(false);statusEl.textContent=e.message}}
function updateStats(items=courses){document.getElementById('total').textContent=compact(items.length);document.getElementById('published').textContent=compact(items.filter(c=>c.status==='published').length);document.getElementById('draft').textContent=compact(items.filter(c=>c.status==='draft').length);document.getElementById('lessons').textContent=compact(items.reduce((s,c)=>s+Number(c.lessonCount||0),0))}
function render(){const q=search.value.trim().toLowerCase();const items=courses.filter(c=>!q||[c.title,c.teacher,c.tool,c.summary].join(' ').toLowerCase().includes(q));updateStats(items);if(!items.length){list.innerHTML=`<div class="empty">${courses.length?'没有匹配的课程。':'暂无课程。'}</div>`;return}list.innerHTML=items.map(c=>`<article class="course-row" data-id="${esc(c.id)}"><img class="cover" src="${esc(cover(c.cover))}" onerror="this.onerror=null;this.src='assets/yoooov-logo-v2-soft.svg'" alt=""><div><h3 class="name">${esc(c.title)}</h3><p class="meta">${esc(c.teacher)} · ${esc(c.tool)} · ${esc(c.difficulty)} · ${compact(c.lessonCount)} 课节</p><p class="summary">${esc(c.summary)}</p></div><div class="course-state"><span class="badge ${esc(c.status)}">${esc(c.status)}</span><p class="meta">${esc(c.updatedAt||c.createdAt||'')}</p></div><div class="row-actions"><button class="btn" data-action="view">查看</button><button class="btn" data-action="edit">编辑</button><button class="btn danger" data-action="delete">删除</button></div></article>`).join('')}
function openEdit(course){editing=course;document.getElementById('editTitle').value=course.title||'';document.getElementById('editTeacher').value=course.teacher||'';document.getElementById('editTool').value=course.tool||'';document.getElementById('editDifficulty').value=course.difficulty||'';document.getElementById('editAge').value=course.ageRange||'';document.getElementById('editCategory').value=course.category||'';document.getElementById('editAccess').value=course.access||'free';document.getElementById('editStatusField').value=course.status||'draft';document.getElementById('editPublishAt').value=course.publishAt||'';document.getElementById('editCover').value=course.cover||'';document.getElementById('editTags').value=Array.isArray(course.tags)?course.tags.join(', '):'';document.getElementById('editSummary').value=course.summary||'';document.getElementById('editDescription').value=course.description||'';document.getElementById('editMsg').textContent='';document.getElementById('editModal').hidden=false}
function closeEdit(){document.getElementById('editModal').hidden=true;editing=null}
list.addEventListener('click',async e=>{const btn=e.target.closest('[data-action]');if(!btn)return;const row=btn.closest('[data-id]');const course=courses.find(c=>String(c.id)===row.dataset.id);if(!course)return;if(btn.dataset.action==='view')location.href=`course_learning.html?course=${encodeURIComponent(course.id)}`;if(btn.dataset.action==='edit')openEdit(course);if(btn.dataset.action==='delete'){if(!confirm(`确定删除课程“${course.title}”吗？`))return;btn.disabled=true;const res=await fetch(`/api/courses/${encodeURIComponent(course.id)}`,{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({passcode})});const data=await res.json().catch(()=>({}));if(!res.ok||!data.ok){alert(data.errorMsg||data.error||'删除失败');btn.disabled=false;return}courses=courses.filter(c=>c.id!==course.id);render();statusEl.textContent='课程已删除。'}});
document.getElementById('editForm').addEventListener('submit',async e=>{e.preventDefault();if(!editing)return;const save=document.getElementById('saveEdit'),msg=document.getElementById('editMsg');save.disabled=true;msg.textContent='正在保存…';const body={passcode,title:editTitle.value,teacher:editTeacher.value,tool:editTool.value,difficulty:editDifficulty.value,ageRange:editAge.value,category:editCategory.value,access:editAccess.value,status:editStatusField.value,publishAt:editPublishAt.value,cover:editCover.value,tags:editTags.value,summary:editSummary.value,description:editDescription.value};try{const res=await fetch(`/api/courses/${encodeURIComponent(editing.id)}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await res.json().catch(()=>({}));if(!res.ok||!data.ok)throw new Error(data.errorMsg||data.error||'保存失败');courses=courses.map(c=>c.id===editing.id?data.course:c);render();closeEdit();statusEl.textContent='课程已保存。'}catch(err){msg.textContent=err.message}finally{save.disabled=false}});
document.getElementById('verify').addEventListener('click',verify);passcodeEl.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();verify()}});document.getElementById('togglePass').addEventListener('click',e=>{passcodeEl.type=passcodeEl.type==='password'?'text':'password';e.currentTarget.textContent=passcodeEl.type==='password'?'显示':'隐藏'});document.getElementById('clear').addEventListener('click',()=>{setVerified(false);courses=[];list.innerHTML='';statusEl.textContent='';});search.addEventListener('input',render);document.getElementById('closeEdit').addEventListener('click',closeEdit);document.getElementById('cancelEdit').addEventListener('click',closeEdit);updateStats([]);setVerified(false);
</script>
</body>
</html>
